trigger:
  branches:
    include:
      - main
      - develop

variables:
  SONAR_PROJECT_KEY: 'taskapp-cicd_taskapp-backend'
  SONAR_HOST_URL: 'http://13.67.38.56:9000'

stages:
  - stage: SAST
    displayName: 'Security - SAST (SonarQube)'
    jobs:
      - job: SonarScan
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
            fetchDepth: 0 # Full history needed for blame

          - task: SonarQubePrepare@5
            displayName: 'Prepare SonarQube Analysis'
            inputs:
              SonarQube: 'sonarqube-connection' # Service connection name in Azure DevOps
              scannerMode: 'CLI'
              configMode: 'manual'
              cliProjectKey: $(SONAR_PROJECT_KEY)
              cliProjectName: 'Task App Backend'
              extraProperties: |
                sonar.sources=server
                sonar.exclusions=**/node_modules/**,**/client/**

          - task: SonarQubeAnalyze@5
            displayName: 'Run SonarQube Analysis'

          - task: SonarQubePublish@5
            displayName: 'Publish Quality Gate Result'
            inputs:
              pollingTimeoutSec: '300'

  - stage: BuildAndDeploy
    displayName: 'Build & Deploy'
    dependsOn: SAST
    condition: succeeded() # Only runs if SAST stage successfully passed the Quality Gate
    jobs:
      - job: Build
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - script: echo 'Building and deploying to Azure Container Apps...'
            displayName: 'Deploy Application'
          # You can add your docker build & push script or Terraform apply commands here

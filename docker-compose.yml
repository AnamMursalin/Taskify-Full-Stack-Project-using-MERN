version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      # You should override these with your actual production secrets when deploying
      - MONGODB_URI=mongodb+srv://admin:admin985@cluster1.wwdjprd.mongodb.net/taskify?appName=Cluster1
      - JWT_SECRET=mysecretkey

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
